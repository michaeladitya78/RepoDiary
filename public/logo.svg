<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <!-- Icon mark: RD monogram -->
  <g transform="translate(4, 8)">
    <!-- Vertical bar of the R / H -->
    <rect x="6" y="4" width="6" height="52" rx="3" fill="#7C3AED"/>
    <!-- Top horizontal connector -->
    <rect x="6" y="4" width="22" height="6" rx="3" fill="#7C3AED"/>
    <!-- Middle horizontal connector -->
    <rect x="6" y="26" width="18" height="6" rx="3" fill="#7C3AED"/>
    <!-- The D arc -->
    <path d="M28 4 C52 4, 58 28, 52 44 C48 56, 36 58, 28 58 L28 52 C38 52, 48 46, 48 30 C48 14, 38 10, 28 10 Z" fill="#7C3AED"/>
    <!-- Inner D curve cutout -->
    <path d="M28 14 C40 14, 44 22, 44 30 C44 40, 38 48, 28 48 L28 32 L12 32 L12 26 L28 26 Z" fill="#0d1117"/>
    <!-- Node dot (teal accent) -->
    <circle cx="16" cy="64" r="7" fill="#06B6D4"/>
    <!-- Vertical stem to dot -->
    <rect x="13" y="55" width="6" height="12" rx="3" fill="#7C3AED"/>
  </g>
  <!-- Text: RepoDiary -->
  <text x="76" y="50" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5" fill="#7C3AED">RepoDiary</text>
</svg>
